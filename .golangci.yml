# golangci-lint v2 config
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - misspell
    - revive
    - unconvert
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
