# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit
# This YAML is the source of truth — dashboard UI is for read-only inspection.

language: ko-KR

tone_instructions: |
  Be a strong peer reviewer, not a typo checker.

  The project's merge gate (docs/workflow/agent-driven-development.md) is:
  "6개월 뒤 술자리에서 후배에게 1시간 설명할 수 있는가?"

  Your job: challenge unstated assumptions, surface missing alternatives,
  flag where the rationale would not survive that 1-hour explanation.
  Be terse, direct, and specific. Skip flattery. If the change is fine,
  say so in one line.

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "docs/adr/**"
      instructions: |
        Critique reasoning depth and alternatives considered.
        Surface unstated assumptions and missing edge cases.
        Ask: would this decision survive a hostile peer-review by an
        experienced engineer who disagrees with the premise? If not, say where.
        Do not police prose style or typos here.

    - path: "pkg/**/*.go"
      instructions: |
        Idiomatic Go focus:
        - error wrapping with %w; never `fmt.Errorf("%v", err)`
        - context propagation (deadlines, cancellation, request id)
        - goroutine leaks — every spawn needs a clear lifetime
        - mutex placement, deadlock risk, race-y shared state
        - allocation hot paths and sync.Pool candidates
        - compile-time interface satisfaction: `var _ Iface = (*Impl)(nil)`
        - exported API: doc comments only when WHY is non-obvious

    - path: "**/*_test.go"
      instructions: |
        Verify:
        - table-driven tests with descriptive case names
        - `t.Helper()` on assertion helpers
        - `t.Parallel()` where safe; flag shared-state hazards
        - recorded provider fixtures match real response shapes
        - no time.Sleep flake patterns — prefer eventually/poll helpers

    - path: ".github/workflows/**"
      instructions: |
        Verify:
        - pinned action versions (no @master, no floating @v* tags on critical paths)
        - least-privilege `permissions:` block
        - cache keys reflect dependency hashes
        - build/test/lint toolchain matches go.mod `go` directive

chat:
  auto_reply: true
