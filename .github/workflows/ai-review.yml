name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  code-reviewer:
    name: code-reviewer
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request following the rubric in
            `.claude/skills/pr-reviewer/SKILL.md` exactly.

            The PR branch is checked out in the current working directory.

            POSTING RULES (mandatory):
            - Use `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
              to post the top-level summary comment in the format prescribed by the skill.
            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`)
              for concrete `file:line` findings that benefit from inline placement.
            - Only post via these tools — do not return review text as your final message.

            Korean prose, terse, file:line citations. Don't bikeshed.

  adr-critic:
    name: adr-critic
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - id: changed
        name: Detect ADR changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base"..."$head" | grep -q '^docs/adr/'; then
            echo "adr_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "adr_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.changed.outputs.adr_changed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            One or more files under `docs/adr/` changed in this PR.
            Review using the rubric in `.claude/skills/adr-critic/SKILL.md` exactly.

            POSTING RULES (mandatory):
            - Use `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
              to post the top-level critique in the format prescribed by the skill.
            - Inline comments via `mcp__github_inline_comment__create_inline_comment`
              are optional for ADRs — use sparingly, only when a single line is the load-bearing claim.
            - Only post via these tools — do not return critique text as your final message.

            Korean prose, assertive, stress-test the decision.
